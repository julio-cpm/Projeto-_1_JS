<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de filmes</title>
    <script src="cadastro.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="divPai">
        <h2>Cadastro de Filmes 🎥</h2>

        <input type="text" id="titulo" placeholder="Digite um Título">
        <input type="number" id="ano" placeholder="Digite o Ano">
        <input type="text" id="classificacao" placeholder="Classificação">
        <button id="btnCadastrar">Cadastrar Filmes 🎥</button>

        <h3>Filtrar por Classificação 🔞</h3>
        <input type="text" id="filtroClassificacao" placeholder="Digite a classificação">
        <button id="btnFiltrarClassificacao">Filtrar 🔍</button>

        <h3>Filtrar por Ano 📆</h3>
        <input type="number" id="filtroAno" placeholder="Digite o ano">
        <button id="btnFiltrarAno">Filtrar 🔍</button>

        <div class="lista">
            <h3>Lista de Filmes: 🎥</h3>
            <p id="listaFilmes"></p>
        </div>
    </div>
</body>

</html>
